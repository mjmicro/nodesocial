name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .turbo
          key: ${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node20-

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/database/prisma/schema.prisma

      - name: Lint
        run: npx turbo run lint --filter=!@truthlayer/app

      - name: Type-check
        run: npx turbo run type-check --filter=!@truthlayer/app

      - name: Build
        run: npx turbo run build --filter=!@truthlayer/app
